# Synthetic toy-data smoke-test config.
# This config is for format validation only, not for paper-level results.
project:
  name: trajflow_toy
  output_dir: ./outputs_toy
  seed: 42

data:
  dataset_type: didi
  region: Toy
  dataset_folder: data/toy_data
  sample_count: -1
  trajectory_length: 120
  batch_size: 64
  parametrized: true
  parametrized_method: rdp_k
  parametrized_M: 10
  norm1by1: true
  od_finer: false
  geohash: false

flow_matching:
  enabled: true
  dropout_prob: 0.1
  flow_type: standard

ddpm:
  enabled: false
  beta_schedule: linear
  beta_start: 0.000001
  beta_end: 0.05
  num_diffusion_timesteps: 300
  ddim_steps: 300

condition:
  enabled: true
  condition_type: full
  transportation_mode: true
  embedding_type: wide_and_deep
  cfg_scale: 1

model:
  type: unet
  hidden_dim: 256

training:
  num_epochs: 2
  learning_rate: 0.0001
  print_every: 1
  save_every: 1
  viz_bool: false
  early_stop_patience: 10
  early_stop_delta: 0.000001
  device: cpu

solver:
  method: euler
  step_size: 0.01

inference:
  num_samples: 16
  num_steps: 10
  sampling_method: em

visualization:
  num_samples: 16
  create_gif: false
  fps: 2
  norm1by12origialvis: true

unet:
  type: bayesian
  guidance_scale: 3
  in_channels: 2
  out_ch: 2
  ch: 64
  ch_mult: [1, 2, 2, 2]
  num_res_blocks: 2
  attn_resolutions: [16]
  dropout: 0.1
  var_type: fixedlarge
  ema_rate: 0.9999
  ema: true
  resamp_with_conv: true
  grid_dim: 512

baseline:
  enabled: false
  type: markov
